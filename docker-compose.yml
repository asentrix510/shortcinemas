services:

  nginx:
    image: nginx:latest

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - backend1
      - backend2
      - backend3

  frontend:
    build: ./sc-fe

    ports:
      - "3000:80"

    depends_on:
      - nginx

  backend1:
    build: ./sc-be

    ports:
      - "8001:8000"

    volumes:
      - ./sc-be:/app

    env_file:
      - ./sc-be/.env

    environment:
      INSTANCE_NAME: backend1

    depends_on:
      - db

  backend2:
    build: ./sc-be

    ports:
      - "8002:8000"

    volumes:
      - ./sc-be:/app

    env_file:
      - ./sc-be/.env

    environment:
      INSTANCE_NAME: backend2

    depends_on:
      - db

  backend3:
    build: ./sc-be

    ports:
      - "8003:8000"

    volumes:
      - ./sc-be:/app

    env_file:
      - ./sc-be/.env

    environment:
      INSTANCE_NAME: backend3

    depends_on:
      - db

  db:
    image: postgres:15

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shortcinemas

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: