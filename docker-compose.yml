services:

  frontend:
    build: ./sc-fe

    ports:
      - "3000:80"

    depends_on:
      - backend


  backend:
    build: ./sc-be

    ports:
      - "8000:8000"

    volumes:
      - ./sc-be:/app

    env_file:
      - ./sc-be/.env

    depends_on:
      - db


  db:
    image: postgres:15

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shortcinemas

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data: